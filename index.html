<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özel Dokunuş - Gelişim Analiz Sistemi</title>
    <!-- Tailwind CSS ve Fontlar -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- React ve Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .progress-bar { transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        (() => {
            const { useState, Fragment } = React;

            // --- İKONLAR ---
            const Icons = {
                ChevronRight: ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>,
                User: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                Phone: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
                Baby: () => <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 12h.01"/><path d="M15 12h.01"/><path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5"/><path d="M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 12 3c2 0 3.5 1.1 3.5 2.5s-.9 2.5-2 2.5c-.8 0-1.5-.4-1.5-1"/></svg>,
                GraduationCap: () => <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>,
                Activity: () => <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
                Zap: () => <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
                MessageCircle: ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>,
                Heart: ({ fill = "none" }) => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>,
                Star: ({ fill = "none" }) => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
                Map: () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z"/><path d="M15 5.764v15"/><path d="M9 3.236v15"/></svg>,
                ShieldCheck: () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>,
                Send: ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>,
                CheckCircle2: ({ size = 96 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>,
                ThumbsUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.53l-2.71 8.12a2 2 0 0 1-1.92 1.35H7"/><path d="M10 14h.01"/><path d="M13 14h.01"/><path d="M16 14h.01"/><path d="M2 10h3a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V11a1 1 0 0 1 1-1Z"/></svg>,
                AlertTriangle: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>,
                Home: ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
                Loader2: ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin-custom"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            };

            // --- TEST VERİLERİ ---
            const DATA = {
                autism_early: {
                    title: "Erken Çocukluk Gelişim Haritası", category: "Otizm Destek Eğitimi", age: "0-3 Yaş", icon: <Icons.Baby />, color: "indigo",
                    questions: [
                        { id: "ae_1", text: "İsmiyle seslenildiğinde dönüp bakıyor mu?", riskIf: false, label: "İsim Tepkisi" },
                        { id: "ae_2", text: "İlgisini çeken bir nesneyi parmağıyla gösteriyor mu?", riskIf: false, label: "Ortak Dikkat" },
                        { id: "ae_3", text: "Sizin işaret ettiğiniz bir nesneye bakıyor mu?", riskIf: false, label: "Görsel Takip" },
                        { id: "ae_4", text: "Sizinle düzenli göz teması kuruyor mu?", riskIf: false, label: "Sosyal Göz Teması" },
                        { id: "ae_5", text: "Günde ortalama kaç saat ekran maruziyeti var?", type: 'choice', options: ["0-2 Saat", "2-4 Saat", "4+ Saat"], riskIf: (v) => v !== "0-2 Saat", label: "Dijital Denge" },
                        { id: "ae_6", text: "Parmak ucunda yürüme gibi hareketler var mı?", riskIf: true, label: "Motor Rutinler" }
                    ]
                },
                learning: {
                    title: "Özel Öğrenme Güçlüğü Analizi", category: "Özel Ders Danışmanlık", age: "7-12 Yaş", icon: <Icons.GraduationCap />, color: "amber",
                    questions: [
                        { id: "ld_1", text: "Okurken sık sık satır atlıyor mu?", riskIf: true, label: "Okuma Akıcılığı" },
                        { id: "ld_2", text: "Harfleri birbirine karıştırıyor mu?", riskIf: true, label: "Harf Farkındalığı" },
                        { id: "ld_3", text: "Okuma hızı sınıfına göre belirgin yavaş mı?", riskIf: true, label: "İşleme Hızı" },
                        { id: "ld_4", text: "Yazı yazarken harf eksiltiyor mu?", riskIf: true, label: "Yazılı Anlatım" },
                        { id: "ld_5", text: "Matematik işlemlerinde parmak sayıyor mu?", riskIf: true, label: "Matematik Mantığı" },
                        { id: "ld_6", text: "Sağ-sol ayrımı yapmakta zorlanıyor mu?", riskIf: true, label: "Yönelim Becerisi" }
                    ]
                },
                autism_school: {
                    title: "Okul Çağı Sosyal Uyum Taraması", category: "Otizm Destek Eğitimi", age: "7+ Yaş", icon: <Icons.Activity />, color: "rose",
                    questions: [
                        { id: "as_1", text: "Şakaları anlamakta güçlük çekiyor mu?", riskIf: true, label: "Pragmatik Dil" },
                        { id: "as_2", text: "Akranlarıyla arkadaşlık kurmakta zorlanıyor mu?", riskIf: true, label: "Sosyal Etkileşim" },
                        { id: "as_3", text: "Kısıtlı ilgi alanları hakkında tek taraflı mı konuşur?", riskIf: true, label: "İlgi Esnekliği" },
                        { id: "as_4", text: "Beklenmedik plan değişiklikleri kriz yaratır mı?", riskIf: true, label: "Adaptasyon" },
                        { id: "as_5", text: "Ses tonu mekanik veya çok kitabi mi?", riskIf: true, label: "Konuşma Tonlaması" },
                        { id: "as_6", text: "Göz teması kurma becerisi zayıf mı?", riskIf: true, label: "Beden Dili" }
                    ]
                },
                adhd: {
                    title: "Dikkat ve Hareketlilik Değerlendirme", category: "Çocuk Gelişim Değerlendirme", age: "5-15 Yaş", icon: <Icons.Zap />, color: "emerald",
                    questions: [
                        { id: "ad_1", text: "Dikkatini bir işe verme süresi çok mu kısa?", riskIf: true, label: "Sürdürülebilir Odak" },
                        { id: "ad_2", text: "Sürekli hareket halinde mi?", riskIf: true, label: "Hiperaktivite" },
                        { id: "ad_3", text: "Sırasını beklemekte zorlanıyor mu?", riskIf: true, label: "Öz Denetim" },
                        { id: "ad_4", text: "Eşyalarını sık sık kaybediyor mu?", riskIf: true, label: "Organizasyon" },
                        { id: "ad_5", text: "Dış uyaranlarla dikkati kolay dağılıyor mu?", riskIf: true, label: "Dikkat Dağılımı" },
                        { id: "ad_6", text: "Sorulan soru bitmeden cevap veriyor mu?", riskIf: true, label: "Bilişsel Esneklik" }
                    ]
                }
            };

            function App() {
                const [view, setView] = useState('landing');
                const [trackKey, setTrackKey] = useState(null);
                const [answers, setAnswers] = useState({});
                const [formData, setFormData] = useState({ name: '', phone: '', gender: '', exactAge: '', kvkk: false, whatsapp: true });
                const [loading, setLoading] = useState(false);
                const [analysisSummary, setAnalysisSummary] = useState({ strengths: [], needs: [] });

                const generateQuickAnalysis = (currentAnswers, currentTrackKey) => {
                    const track = DATA[currentTrackKey];
                    const strengths = [];
                    const needs = [];
                    track.questions.forEach(q => {
                        const ans = currentAnswers[q.id];
                        const isRisk = typeof q.riskIf === 'function' ? q.riskIf(ans) : ans === q.riskIf;
                        if (isRisk) needs.push(q.label); else strengths.push(q.label);
                    });
                    return { strengths: strengths.slice(0, 3), needs: needs.slice(0, 3) };
                };

                const handleAnswer = (qId, value, nextQId) => {
                    setAnswers(prev => ({ ...prev, [qId]: value }));
                    if (nextQId) {
                        setTimeout(() => {
                            const el = document.getElementById(`q-${nextQId}`);
                            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }, 100);
                    }
                };

                const handleFinalSubmit = async () => {
                    setLoading(true);
                    const track = DATA[trackKey];
                    
                    const testResultsText = track.questions.map(q => {
                        const ans = answers[q.id];
                        const label = typeof ans === 'boolean' ? (ans ? 'EVET' : 'HAYIR') : ans;
                        return `${q.text} -> ${label}`;
                    }).join('\n');

                    const payload = {
                        tarih: new Date().toLocaleString('tr-TR'),
                        veli_ad_soyad: formData.name,
                        telefon: formData.phone,
                        cocuk_cinsiyet: formData.gender,
                        cocuk_yas: formData.exactAge,
                        test_kategorisi: track.title,
                        guclu_yanlar: analysisSummary.strengths.join(', '),
                        destek_alanlari: analysisSummary.needs.join(', '),
                        test_yanitlari: testResultsText,
                        kvkk_onay: formData.kvkk ? "ONAYLANDI" : "ONAYLANMADI",
                        whatsapp_izni: formData.whatsapp ? "EVET" : "HAYIR"
                    };

                    try {
                        // Veriler doğrudan formspree adresine gider
                        await fetch('https://formspree.io/f/mgorekwk', { 
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify(payload) 
                        });
                        
                        setView('success');
                        const waMsg = encodeURIComponent(`Merhaba Serhat Bey, Özel Dokunuş gelişim testini tamamladım. Raporun e-postanıza ulaştığını teyit etmek ve detaylar hakkında görüşmek istiyorum.\n\nVeli: ${formData.name}`);
                        setTimeout(() => { 
                            window.location.href = `https://wa.me/905324997374?text=${waMsg}`; 
                        }, 3500);

                    } catch (e) {
                        setView('success');
                    } finally {
                        setLoading(false);
                    }
                };

                // --- UI BİLEŞENLERİ ---

                if (view === 'landing') return (
                    <div className="min-h-screen bg-white fade-in">
                        <section className="bg-indigo-900 text-white px-6 py-24 md:py-36 text-center space-y-10 rounded-b-[4rem] shadow-2xl relative overflow-hidden">
                            <div className="max-w-4xl mx-auto space-y-8 relative z-10">
                                <div className="flex items-center justify-center gap-2 mb-2">
                                    <Icons.ShieldCheck />
                                    <span className="text-sm font-black uppercase tracking-[0.3em] text-indigo-300">Özel Dokunuş Eğitim Danışmanlık</span>
                                </div>
                                <h1 className="text-4xl md:text-8xl font-black leading-tight tracking-tight">
                                    Her Çocuk Özeldir, <br/>
                                    <span className="text-indigo-400">Gelişim Bir Yolculuktur.</span>
                                </h1>
                                <p className="text-indigo-100 text-lg md:text-2xl font-medium max-w-2xl mx-auto opacity-90 italic">
                                    Çocuğunuzun potansiyelini bilimsel yöntemlerle analiz ediyor, raporunuzu doğrudan uzmanımıza ulaştırıyoruz.
                                </p>
                                <div className="pt-8">
                                    <button onClick={() => setView('selection')} className="bg-white text-indigo-900 px-12 py-7 rounded-[2.5rem] font-black text-2xl shadow-2xl hover:bg-indigo-50 transition-all flex items-center gap-4 mx-auto active:scale-95 group">
                                        Ücretsiz Analizi Başlat <Icons.ChevronRight size={32} />
                                    </button>
                                </div>
                            </div>
                        </section>
                        <section className="px-6 py-24 max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-10">
                            <div className="p-10 rounded-[3.5rem] bg-slate-50 border border-slate-100 hover:shadow-2xl transition-all">
                                <div className="w-20 h-20 bg-rose-100 text-rose-600 rounded-3xl flex items-center justify-center mb-6 shadow-sm"><Icons.Heart fill="currentColor" /></div>
                                <h3 className="font-black text-3xl text-slate-800 pt-4">Bireysel Özel Ders</h3>
                                <p className="text-slate-500 font-semibold leading-relaxed italic text-sm">Öğrenme güçlüğü ve akademik engellere karşı kişiye özel yaklaşımlar.</p>
                            </div>
                            <div className="p-10 rounded-[3.5rem] bg-slate-50 border border-slate-100 hover:shadow-2xl transition-all">
                                <div className="w-20 h-20 bg-amber-100 text-amber-600 rounded-3xl flex items-center justify-center mb-6 shadow-sm"><Icons.Star fill="currentColor" /></div>
                                <h3 className="font-black text-3xl text-slate-800 pt-4">Aile Danışmanlığı</h3>
                                <p className="text-slate-500 font-semibold leading-relaxed italic text-sm">Ebeveynler için sürdürülebilir gelişim ve çözüm stratejileri.</p>
                            </div>
                            <div className="p-10 rounded-[3.5rem] bg-slate-50 border border-slate-100 hover:shadow-2xl transition-all">
                                <div className="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-3xl flex items-center justify-center mb-6 shadow-sm"><Icons.Map size={32} /></div>
                                <h3 className="font-black text-3xl text-slate-800 pt-4">Gelişim Planı</h3>
                                <p className="text-slate-500 font-semibold leading-relaxed italic text-sm">Her çocuğun eşsiz gelişim hızına özel uzman yol haritaları.</p>
                            </div>
                        </section>
                    </div>
                );

                if (view === 'selection') return (
                    <div className="min-h-screen bg-slate-50 py-24 px-6 fade-in text-center">
                        <div className="max-w-5xl mx-auto space-y-16">
                            <div className="space-y-4">
                                <button onClick={() => setView('landing')} className="text-slate-400 font-black text-xs uppercase tracking-widest mb-4 hover:text-indigo-600 flex items-center gap-2 mx-auto">&larr; Geri Dön</button>
                                <h2 className="text-4xl md:text-6xl font-black text-slate-900 leading-tight">Gelişim Basamağını Seçin</h2>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {Object.entries(DATA).map(([key, item]) => (
                                    <button key={key} onClick={() => { setTrackKey(key); setView('quiz'); window.scrollTo(0,0); }} className="bg-white p-12 rounded-[4rem] shadow-xl hover:shadow-2xl border-4 border-transparent hover:border-indigo-400 transition-all flex items-center gap-10 active:scale-95 group text-left">
                                        <div className={`text-${item.color}-600 p-8 bg-${item.color}-50 rounded-[2.5rem] group-hover:scale-110 transition-transform`}>{item.icon}</div>
                                        <div className="space-y-4">
                                            <h3 className="text-3xl font-black text-slate-800 leading-tight">{item.title}</h3>
                                            <span className="text-xs font-black text-indigo-600 bg-indigo-50 px-5 py-2 rounded-full uppercase">{item.age}</span>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );

                if (view === 'quiz') {
                    const track = DATA[trackKey];
                    const progress = (Object.keys(answers).length / track.questions.length) * 100;
                    return (
                        <div className="min-h-screen bg-slate-50 p-4 md:p-8 flex flex-col items-center fade-in">
                            <div className="w-full max-w-2xl space-y-8">
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-xl flex items-center justify-between sticky top-4 z-50">
                                    <button onClick={() => setView('selection')} className="text-slate-400 text-xs font-black uppercase tracking-widest hover:text-red-500">&larr; Vazgeç</button>
                                    <div className="flex-1 mx-6 h-2.5 bg-slate-100 rounded-full overflow-hidden">
                                        <div className="h-full bg-indigo-600 progress-bar" style={{width: `${progress}%`}}></div>
                                    </div>
                                    <span className="text-indigo-600 font-black text-sm">% {Math.round(progress)}</span>
                                </div>
                                <div className="space-y-8 pb-48">
                                    {track.questions.map((q, idx) => (
                                        <div key={q.id} id={`q-${q.id}`} className={`bg-white p-12 rounded-[4rem] shadow-2xl border-2 transition-all duration-500 ${answers[q.id] !== undefined ? 'opacity-30 border-transparent scale-95' : 'border-indigo-100'}`}>
                                            <p className="font-black text-slate-800 text-2xl md:text-3xl leading-tight mb-10">{idx + 1}. {q.text}</p>
                                            <div className="flex gap-5">
                                                <button onClick={() => handleAnswer(q.id, true, track.questions[idx+1]?.id)} className={`flex-1 py-7 rounded-[2.5rem] font-black text-2xl transition-all ${answers[q.id] === true ? 'bg-indigo-600 text-white shadow-2xl' : 'bg-slate-50 text-slate-400'}`}>EVET</button>
                                                <button onClick={() => handleAnswer(q.id, false, track.questions[idx+1]?.id)} className={`flex-1 py-7 rounded-[2.5rem] font-black text-2xl transition-all ${answers[q.id] === false ? 'bg-indigo-600 text-white shadow-2xl' : 'bg-slate-50 text-slate-400'}`}>HAYIR</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="fixed bottom-10 left-4 right-4 max-w-2xl mx-auto text-center">
                                    <button disabled={Object.keys(answers).length < track.questions.length} onClick={() => { setAnalysisSummary(generateQuickAnalysis(answers, trackKey)); setView('details'); window.scrollTo(0,0); }} className="w-full bg-slate-900 text-white py-8 rounded-[3rem] font-black text-2xl shadow-2xl disabled:opacity-20 flex items-center justify-center gap-4 active:scale-95">
                                        Analizi Tamamla & Sonucu Gör <Icons.ChevronRight size={28} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    );
                }

                if (view === 'details') return (
                    <div className="min-h-screen bg-indigo-900 flex flex-col items-center justify-center p-6 py-20 fade-in">
                        <div className="w-full max-w-2xl bg-white p-12 md:p-16 rounded-[5rem] shadow-2xl space-y-10">
                            <div className="space-y-8 text-center">
                                <h2 className="text-3xl font-black text-slate-900">Gelişimsel Ön İzlenim</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                                    <div className="bg-emerald-50 border-2 border-emerald-100 p-8 rounded-[3.5rem] space-y-4">
                                        <div className="flex items-center gap-2 text-emerald-600"><Icons.ThumbsUp /><span className="text-xs font-black uppercase">Güçlü Yanlar</span></div>
                                        <ul className="space-y-2">{analysisSummary.strengths.map(s => <li key={s} className="text-slate-700 text-sm font-bold flex items-center gap-3"><div className="w-2 h-2 bg-emerald-400 rounded-full"></div> {s}</li>)}</ul>
                                    </div>
                                    <div className="bg-rose-50 border-2 border-rose-100 p-8 rounded-[3.5rem] space-y-4">
                                        <div className="flex items-center gap-2 text-rose-600"><Icons.AlertTriangle /><span className="text-xs font-black uppercase">Hassas Alanlar</span></div>
                                        <ul className="space-y-2">{analysisSummary.needs.map(n => <li key={n} className="text-slate-700 text-sm font-bold flex items-center gap-3"><div className="w-2 h-2 bg-rose-400 rounded-full"></div> {n}</li>)}</ul>
                                    </div>
                                </div>
                                <p className="text-xs text-slate-500 font-bold italic border-t pt-4">Kapsamlı raporun uzmanımıza iletilmesi için bilgileri doldurun.</p>
                            </div>
                            <div className="space-y-5">
                                <div className="grid grid-cols-2 gap-5">
                                    <select onChange={e => setFormData({...formData, gender: e.target.value})} className="p-6 bg-slate-50 rounded-[2rem] font-black text-lg border-none focus:ring-4 ring-indigo-100"><option value="">Cinsiyet</option><option value="Erkek">Erkek</option><option value="Kız">Kız</option></select>
                                    <input placeholder="Tam Yaşı" onChange={e => setFormData({...formData, exactAge: e.target.value})} className="p-6 bg-slate-50 rounded-[2rem] font-black text-lg border-none focus:ring-4 ring-indigo-100" />
                                </div>
                                <input placeholder="Veli Ad Soyad" onChange={e => setFormData({...formData, name: e.target.value})} className="w-full p-6 bg-slate-50 rounded-[2rem] font-black text-lg border-none focus:ring-4 ring-indigo-100" />
                                <input placeholder="Telefon (05XX...)" maxLength={11} onChange={e => setFormData({...formData, phone: e.target.value.replace(/\D/g, '')})} className="w-full p-6 bg-slate-50 rounded-[2rem] font-black text-2xl border-none focus:ring-4 ring-indigo-100" />
                                <label className="flex items-start gap-4 p-5 bg-indigo-50/50 rounded-[2.5rem] cursor-pointer">
                                    <input type="checkbox" onChange={e => setFormData({...formData, kvkk: e.target.checked})} className="mt-1 w-6 h-6 rounded" />
                                    <span className="text-xs text-indigo-900 font-black">Analiz raporunun e-posta ile tarafıma iletilmesini ve KVKK kapsamında verilerimin incelenmesini kabul ediyorum.</span>
                                </label>
                            </div>
                            <button disabled={!formData.name || formData.phone.length !== 11 || !formData.kvkk || loading} onClick={handleFinalSubmit} className="w-full bg-indigo-600 text-white py-7 rounded-[3rem] font-black text-2xl shadow-2xl flex items-center justify-center gap-4 active:scale-95 disabled:opacity-30 border-b-8 border-indigo-800">
                                {loading ? <Icons.Loader2 size={32} /> : <Fragment><Icons.Send /> Raporu Uzmana Gönder</Fragment>}
                            </button>
                        </div>
                    </div>
                );

                if (view === 'success') return (
                    <div className="min-h-screen bg-white flex flex-col items-center justify-center p-8 text-center space-y-14 fade-in">
                        <div className="w-44 h-44 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center shadow-inner animate-bounce border-8 border-white ring-[12px] ring-emerald-50"><Icons.CheckCircle2 /></div>
                        <div className="space-y-6">
                            <h2 className="text-5xl font-black text-slate-900 italic leading-tight">Tebrikler!</h2>
                            <p className="text-2xl text-slate-500 font-medium max-w-3xl leading-relaxed">Verileriniz e-posta yoluyla uzmanımıza iletildi. Detaylı analiz raporu hazırlanırken hemen WhatsApp üzerinden tanışabiliriz.</p>
                        </div>
                        <div className="flex flex-col gap-6 w-full max-w-lg">
                            <a href="https://wa.me/905324997374" className="bg-emerald-500 text-white py-8 rounded-[3rem] font-black text-3xl flex items-center justify-center gap-5 shadow-2xl border-b-[10px] border-emerald-700 animate-pulse">
                                <Icons.MessageCircle size={40} /> Uzmanla Hemen Görüş
                            </a>
                            <button onClick={() => window.location.reload()} className="flex items-center justify-center gap-2 text-indigo-600 font-black text-lg pt-6 group transition-all"><Icons.Home /> Anasayfaya gitmek için tıklayınız</button>
                        </div>
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        })();
    </script>
</body>
</html>
