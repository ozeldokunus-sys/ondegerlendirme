<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Özel Dokunuş - Gelişim Analiz Sistemi</title>
    <!-- Tailwind CSS ve Yazı Tipleri -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- React ve Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
        }
        .progress-bar { transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .active-scale:active { transform: scale(0.96); transition: 0.1s; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        (() => {
            const { useState, Fragment, useEffect } = React;

            // --- İKON BİLEŞENLERİ (SVG ÇÖZÜMÜ) ---
            const Icons = {
                ChevronRight: ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>,
                User: ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                Phone: ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
                Baby: ({ size = 40 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 12h.01"/><path d="M15 12h.01"/><path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5"/><path d="M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 12 3c2 0 3.5 1.1 3.5 2.5s-.9 2.5-2 2.5c-.8 0-1.5-.4-1.5-1"/></svg>,
                GraduationCap: ({ size = 40 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>,
                Activity: ({ size = 40 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
                Zap: ({ size = 40 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
                MessageCircle: ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>,
                Heart: ({ fill = "none", size = 32 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>,
                Star: ({ fill = "none", size = 32 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
                Map: ({ size = 32 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z"/><path d="M15 5.764v15"/><path d="M9 3.236v15"/></svg>,
                ShieldCheck: ({ size = 28 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>,
                Send: ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>,
                CheckCircle2: ({ size = 96 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>,
                ThumbsUp: ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.53l-2.71 8.12a2 2 0 0 1-1.92 1.35H7"/><path d="M10 14h.01"/><path d="M13 14h.01"/><path d="M16 14h.01"/><path d="M2 10h3a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V11a1 1 0 0 1 1-1Z"/></svg>,
                AlertTriangle: ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>,
                Home: ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
                Loader2: ({ size = 24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin-custom"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            };

            const DATA = {
                autism_early: {
                    title: "Erken Çocukluk Gelişim Haritası", category: "Otizm Destek Eğitimi", age: "2-5 Yaş", icon: <Icons.Baby />, color: "indigo",
                    questions: [
                        { id: "ae_1", text: "İsmiyle seslenildiğinde dönüp bakıyor mu?", riskIf: false, label: "İsim Tepkisi" },
                        { id: "ae_2", text: "İlgisini çeken bir nesneyi parmağıyla size gösteriyor mu?", riskIf: false, label: "Ortak Dikkat" },
                        { id: "ae_3", text: "Sizin işaret ettiğiniz bir nesneye bakıyor mu?", riskIf: false, label: "Görsel Takip" },
                        { id: "ae_4", text: "Sizinle veya başkalarıyla düzenli göz teması kuruyor mu?", riskIf: false, label: "Sosyal Göz Teması" },
                        { id: "ae_5", text: "Günde ortalama kaç saat ekran maruziyeti (TV/Tablet) var?", type: 'choice', options: ["0-2 Saat", "2-4 Saat", "4+ Saat"], riskIf: (v) => v !== "0-2 Saat", label: "Dijital Denge" },
                        { id: "ae_6", text: "Parmak ucunda yürüme veya kendi etrafında dönme gibi hareketler var mı?", riskIf: true, label: "Motor Rutinler" }
                    ]
                },
                learning: {
                    title: "Özel Öğrenme Güçlüğü Analizi", category: "Özel Ders Danışmanlık", age: "7-12 Yaş", icon: <Icons.GraduationCap />, color: "amber",
                    questions: [
                        { id: "ld_1", text: "Okurken sık sık satır atlıyor veya kelime sonlarını uyduruyor mu?", riskIf: true, label: "Okuma Akıcılığı" },
                        { id: "ld_2", text: "b-d, m-n, p-q gibi benzer harfleri birbirine karıştırıyor mu?", riskIf: true, label: "Harf Farkındalığı" },
                        { id: "ld_3", text: "Okuma hızı sınıf ortalamasına göre belirgin şekilde yavaş mı?", riskIf: true, label: "İşleme Hızı" },
                        { id: "ld_4", text: "Yazı yazarken harf, hece veya kelime eksiltiyor mu?", riskIf: true, label: "Yazılı Anlatım" },
                        { id: "ld_5", text: "Basit matematik işlemlerinde hala parmak saymaya devam ediyor mu?", riskIf: true, label: "Matematik Mantığı" },
                        { id: "ld_6", text: "Sağ-sol ayrımı yapmakta veya ayakkabı bağlamakta zorlanıyor mu?", riskIf: true, label: "Yönelim Becerisi" }
                    ]
                },
                autism_school: {
                    title: "Okul Çağı Sosyal Uyum Taraması", category: "Otizm Destek Eğitimi", age: "7+ Yaş", icon: <Icons.Activity />, color: "rose",
                    questions: [
                        { id: "as_1", text: "Şakaları, mecazları veya deyimleri anlamakta güçlük çekiyor mu?", riskIf: true, label: "Pragmatik İletişim" },
                        { id: "as_2", text: "Akranlarıyla arkadaşlık kurma ve sürdürme konusunda zorlanıyor mu?", riskIf: true, label: "Sosyal Etkileşim" },
                        { id: "as_3", text: "Hep aynı kısıtlı ilgi alanları hakkında tek taraflı mı konuşuyor?", riskIf: true, label: "İlgi Esnekliği" },
                        { id: "as_4", text: "Rutinlere aşırı bağlı mı? Beklenmedik plan değişiklikleri kriz yaratıyor mu?", riskIf: true, label: "Adaptasyon" },
                        { id: "as_5", text: "Ses tonu mekanik, vurgusuz veya yaşından daha kitabi mi?", riskIf: true, label: "Konuşma Tonlaması" },
                        { id: "as_6", text: "Göz teması kurma ve vücut dilini kullanma becerisi zayıf mı?", riskIf: true, label: "Beden Dili" }
                    ]
                },
                adhd: {
                    title: "Dikkat ve Hareketlilik Değerlendirme", category: "Çocuk Gelişim Değerlendirme", age: "5-15 Yaş", icon: <Icons.Zap />, color: "emerald",
                    questions: [
                        { id: "ad_1", text: "Dikkatini bir işe (örn: ödev) verme süresi sınıfına göre çok mu kısa?", riskIf: true, label: "Sürdürülebilir Odak" },
                        { id: "ad_2", text: "Sürekli hareket halinde mi? (Sanki bir motor takılmış gibi)", riskIf: true, label: "Hiperaktivite" },
                        { id: "ad_3", text: "Sırasını beklemekte veya dürtülerini kontrol etmekte zorlanıyor mu?", riskIf: true, label: "Öz Denetim" },
                        { id: "ad_4", text: "Eşyalarını (kalem, ceket, kitap) sık sık kaybediyor mu?", riskIf: true, label: "Organizasyon" },
                        { id: "ad_5", text: "Dış uyaranlarla dikkati çok kolay dağılıyor mu?", riskIf: true, label: "Dikkat Dağılımı" },
                        { id: "ad_6", text: "Sorulan soru tam bitmeden cevabı yapıştırıyor mu?", riskIf: true, label: "Bilişsel Esneklik" }
                    ]
                }
            };

            function App() {
                const [view, setView] = useState('landing');
                const [trackKey, setTrackKey] = useState(null);
                const [answers, setAnswers] = useState({});
                const [formData, setFormData] = useState({ name: '', phone: '', gender: '', exactAge: '', kvkk: false });
                const [loading, setLoading] = useState(false);
                const [analysisSummary, setAnalysisSummary] = useState({ strengths: [], needs: [] });

                const generateQuickAnalysis = (currentAnswers, currentTrackKey) => {
                    const track = DATA[currentTrackKey];
                    const strengths = [];
                    const needs = [];
                    track.questions.forEach(q => {
                        const ans = currentAnswers[q.id];
                        const isRisk = typeof q.riskIf === 'function' ? q.riskIf(ans) : ans === q.riskIf;
                        if (isRisk) needs.push(q.label); else strengths.push(q.label);
                    });
                    return { strengths: strengths.slice(0, 3), needs: needs.slice(0, 3) };
                };

                const handleAnswer = (qId, value, nextQId) => {
                    setAnswers(prev => ({ ...prev, [qId]: value }));
                    if (nextQId) {
                        setTimeout(() => {
                            const el = document.getElementById(`q-${nextQId}`);
                            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }, 100);
                    }
                };

                const handleFinalSubmit = async (e) => {
                    if(e) e.preventDefault();
                    setLoading(true);
                    
                    const track = DATA[trackKey];
                    const testResultsText = track.questions.map(q => {
                        const ans = answers[q.id];
                        const label = typeof ans === 'boolean' ? (ans ? 'EVET' : 'HAYIR') : ans;
                        return `${q.text}: ${label}`;
                    }).join('\n');

                    const payload = {
                        name: formData.name,
                        phone: formData.phone,
                        gender: formData.gender,
                        exactAge: formData.exactAge,
                        trackTitle: track.title,
                        testResults: testResultsText,
                        quickSummary: `Güçlü: ${analysisSummary.strengths.join(', ')} | Destek: ${analysisSummary.needs.join(', ')}`,
                        submittedAt: new Date().toLocaleString('tr-TR')
                    };

                    try {
                        // Formspree mgorekwk gönderimi (AJAX Modu)
                        const response = await fetch('https://formspree.io/f/mgorekwk', { 
                            method: 'POST', 
                            mode: 'cors',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Accept': 'application/json' 
                            }, 
                            body: JSON.stringify(payload) 
                        });
                        
                        // Make.com gönderimi
                        fetch('https://hook.eu1.make.com/ez9g17ta1hhqho48vstimvqvx3l1pibz', { 
                            method: 'POST', 
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify(payload) 
                        });

                        setView('success');
                        
                        const waMsg = encodeURIComponent(`Merhaba Serhat Bey, Özel Dokunuş Ön Değerlendirme Testini (${formData.exactAge}) tamamladım. Detaylı analiz raporu ve randevu için görüşmek istiyorum.\n\nVeli: ${formData.name}`);
                        setTimeout(() => { 
                            window.location.href = `https://wa.me/905324997374?text=${waMsg}`; 
                        }, 3500);

                    } catch (e) {
                        setView('success');
                    } finally {
                        setLoading(false);
                    }
                };

                if (view === 'landing') return (
                    <div className="min-h-screen bg-white fade-in overflow-x-hidden">
                        <section className="bg-indigo-900 text-white px-4 py-16 md:py-36 text-center space-y-8 rounded-b-[3rem] md:rounded-b-[4rem] shadow-2xl relative overflow-hidden">
                            <div className="max-w-4xl mx-auto space-y-6 md:space-y-8 relative z-10">
                                <div className="flex items-center justify-center gap-2 mb-2">
                                    <Icons.ShieldCheck size={24} />
                                    <span className="text-[10px] md:text-sm font-black uppercase tracking-[0.2em] text-indigo-300">Özel Dokunuş Eğitim Danışmanlık</span>
                                </div>
                                <h1 className="text-3xl md:text-8xl font-black leading-tight tracking-tight">
                                    Her Çocuk Özeldir, <br/>
                                    <span className="text-indigo-400">Gelişim Bir Yolculuktur.</span>
                                </h1>
                                <p className="text-indigo-100 text-base md:text-2xl font-medium max-w-2xl mx-auto opacity-90 italic px-2">
                                    Çocuğunuzun gelişimsel potansiyelini keşfedin. Bilimsel metotlarla hazırlanan analizimizle en doğru adımları birlikte planlayalım.
                                </p>
                                <div className="pt-4 md:pt-8">
                                    <button onClick={() => setView('selection')} className="bg-white text-indigo-900 px-8 py-5 md:px-12 md:py-7 rounded-2xl md:rounded-[2.5rem] font-black text-lg md:text-2xl shadow-2xl hover:bg-indigo-50 transition-all flex items-center gap-3 mx-auto active-scale">
                                        Testi Başlat <Icons.ChevronRight size={24} />
                                    </button>
                                </div>
                            </div>
                        </section>
                        <section className="px-4 py-16 md:px-6 md:py-24 max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-10">
                            {[
                                { icon: <Icons.Heart />, title: "Bireysel Özel Ders", text: "Akademik engellere karşı kişiye özel yaklaşımlar.", color: "rose" },
                                { icon: <Icons.Star />, title: "Aile Danışmanlığı", text: "Ebeveynler için sürdürülebilir gelişim stratejileri.", color: "amber" },
                                { icon: <Icons.Map />, title: "Gelişim Planı", text: "Eşsiz hızına özel bilimsel yol haritaları.", color: "indigo" }
                            ].map((item, idx) => (
                                <div key={idx} className="p-8 md:p-10 rounded-[2.5rem] md:rounded-[3.5rem] bg-slate-50 border border-slate-100 hover:shadow-xl transition-all group text-center md:text-left">
                                    <div className={`w-16 h-16 bg-${item.color}-100 text-${item.color}-600 rounded-2xl flex items-center justify-center mb-6 shadow-sm mx-auto md:mx-0 group-hover:rotate-12 transition-transform`}>{item.icon}</div>
                                    <h3 className="font-black text-xl md:text-3xl text-slate-800 pt-2">{item.title}</h3>
                                    <p className="text-slate-500 font-semibold leading-relaxed italic text-sm mt-2">{item.text}</p>
                                </div>
                            ))}
                        </section>
                    </div>
                );

                if (view === 'selection') return (
                    <div className="min-h-screen bg-slate-50 py-12 px-4 md:py-24 md:px-6 fade-in text-center overflow-x-hidden">
                        <div className="max-w-5xl mx-auto space-y-12 md:space-y-16">
                            <div className="space-y-4">
                                <button onClick={() => setView('landing')} className="text-slate-400 font-black text-[10px] uppercase tracking-widest mb-4 hover:text-indigo-600 flex items-center gap-2 mx-auto active-scale">&larr; Geri Dön</button>
                                <h2 className="text-3xl md:text-6xl font-black text-slate-900 leading-tight px-4">Gelişim Basamağını Seçin</h2>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8">
                                {Object.entries(DATA).map(([key, item]) => (
                                    <button key={key} onClick={() => { setTrackKey(key); setView('quiz'); window.scrollTo(0,0); }} className="bg-white p-6 md:p-12 rounded-[2rem] md:rounded-[4rem] shadow-lg md:shadow-xl hover:shadow-2xl border-4 border-transparent hover:border-indigo-400 transition-all flex items-center gap-6 md:gap-10 active-scale group text-left">
                                        <div className={`text-${item.color}-600 p-4 md:p-8 bg-${item.color}-50 rounded-2xl md:rounded-[2.5rem] group-hover:scale-110 transition-transform flex-shrink-0`}>{item.icon}</div>
                                        <div className="space-y-2 md:space-y-4 flex-1">
                                            <h3 className="text-lg md:text-3xl font-black text-slate-800 leading-tight">{item.title}</h3>
                                            <span className="inline-block text-[10px] md:text-xs font-black text-indigo-600 bg-indigo-50 px-3 py-1 md:px-5 md:py-2 rounded-full uppercase">{item.age}</span>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );

                if (view === 'quiz') {
                    const track = DATA[trackKey];
                    const progress = (Object.keys(answers).length / track.questions.length) * 100;
                    return (
                        <div className="min-h-screen bg-slate-50 p-4 md:p-8 flex flex-col items-center fade-in">
                            <div className="w-full max-w-2xl space-y-6 md:space-y-8">
                                <div className="bg-white p-4 md:p-6 rounded-2xl md:rounded-[2.5rem] shadow-xl flex items-center justify-between sticky top-4 z-50">
                                    <button onClick={() => setView('selection')} className="text-slate-400 text-[10px] font-black uppercase tracking-widest hover:text-red-500 active-scale">&larr; İptal</button>
                                    <div className="flex-1 mx-4 h-2 bg-slate-100 rounded-full overflow-hidden">
                                        <div className="h-full bg-indigo-600 progress-bar" style={{width: `${progress}%`}}></div>
                                    </div>
                                    <span className="text-indigo-600 font-black text-[10px] md:text-sm">% {Math.round(progress)}</span>
                                </div>
                                <div className="space-y-6 md:space-y-8 pb-32">
                                    {track.questions.map((q, idx) => (
                                        <div key={q.id} id={`q-${q.id}`} className={`bg-white p-6 md:p-12 rounded-[2rem] md:rounded-[4rem] shadow-lg md:shadow-2xl border-2 transition-all duration-500 ${answers[q.id] !== undefined ? 'opacity-30 border-transparent scale-95' : 'border-indigo-100'}`}>
                                            <p className="font-black text-slate-800 text-xl md:text-3xl leading-tight mb-8 md:mb-10">{idx + 1}. {q.text}</p>
                                            <div className="flex gap-4 md:gap-5">
                                                <button onClick={() => handleAnswer(q.id, true, track.questions[idx+1]?.id)} className={`flex-1 py-5 md:py-7 rounded-[1.5rem] md:rounded-[2.5rem] font-black text-lg md:text-2xl transition-all active-scale ${answers[q.id] === true ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-50 text-slate-400'}`}>EVET</button>
                                                <button onClick={() => handleAnswer(q.id, false, track.questions[idx+1]?.id)} className={`flex-1 py-5 md:py-7 rounded-[1.5rem] md:rounded-[2.5rem] font-black text-lg md:text-2xl transition-all active-scale ${answers[q.id] === false ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-50 text-slate-400'}`}>HAYIR</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="fixed bottom-6 md:bottom-10 left-4 right-4 max-w-2xl mx-auto">
                                    <button disabled={Object.keys(answers).length < track.questions.length} onClick={() => { setAnalysisSummary(generateQuickAnalysis(answers, trackKey)); setView('details'); window.scrollTo(0,0); }} className="w-full bg-slate-900 text-white py-6 md:py-8 rounded-2xl md:rounded-[3rem] font-black text-lg md:text-2xl shadow-2xl disabled:opacity-20 flex items-center justify-center gap-4 active-scale">
                                        Analizi Tamamla & Sonucu Gör <Icons.ChevronRight size={28} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    );
                }

                if (view === 'details') return (
                    <div className="min-h-screen bg-indigo-900 flex flex-col items-center justify-center p-4 md:p-6 py-10 md:py-20 fade-in">
                        <div className="w-full max-w-2xl bg-white p-6 md:p-16 rounded-[2.5rem] md:rounded-[5rem] shadow-2xl space-y-8 md:space-y-10">
                            <div className="space-y-6 md:space-y-8 text-center px-2">
                                <h2 className="text-2xl md:text-4xl font-black text-slate-900">Gelişimsel Ön İzlenim</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 text-left">
                                    <div className="bg-emerald-50 border-2 border-emerald-100 p-6 md:p-8 rounded-[1.5rem] md:rounded-[3.5rem] space-y-4 shadow-sm">
                                        <div className="flex items-center gap-2 text-emerald-600"><Icons.ThumbsUp size={20} /><span className="text-[10px] md:text-xs font-black uppercase">Güçlü Yanlar</span></div>
                                        <ul className="space-y-2">{analysisSummary.strengths.map(s => <li key={s} className="text-slate-700 text-xs md:text-sm font-bold flex items-center gap-2 md:gap-3"><div className="w-2 h-2 bg-emerald-400 rounded-full flex-shrink-0"></div> <span className="break-words">{s}</span></li>)}</ul>
                                    </div>
                                    <div className="bg-rose-50 border-2 border-rose-100 p-6 md:p-8 rounded-[1.5rem] md:rounded-[3.5rem] space-y-4 shadow-sm">
                                        <div className="flex items-center gap-2 text-rose-600"><Icons.AlertTriangle size={20} /><span className="text-[10px] md:text-xs font-black uppercase">Hassas Alanlar</span></div>
                                        <ul className="space-y-2">{analysisSummary.needs.map(n => <li key={n} className="text-slate-700 text-xs md:text-sm font-bold flex items-center gap-2 md:gap-3"><div className="w-2 h-2 bg-rose-400 rounded-full flex-shrink-0"></div> <span className="break-words">{n}</span></li>)}</ul>
                                    </div>
                                </div>
                                <p className="text-[10px] md:text-xs text-slate-500 font-bold italic border-t pt-4">Kapsamlı analiz raporunun uzmanlarımıza iletilmesi için formu doldurun.</p>
                            </div>
                            <form onSubmit={handleFinalSubmit} className="space-y-4 md:space-y-5">
                                <div className="grid grid-cols-2 gap-3 md:gap-5">
                                    <select required value={formData.gender} onChange={e => setFormData({...formData, gender: e.target.value})} className="p-4 md:p-6 bg-slate-50 rounded-xl md:rounded-[2rem] font-black text-sm md:text-lg border-none focus:ring-4 ring-indigo-100 transition-all"><option value="">Cinsiyet</option><option value="Erkek">Erkek</option><option value="Kız">Kız</option></select>
                                    <input required placeholder="Tam Yaşı (2-5 vb.)" value={formData.exactAge} onChange={e => setFormData({...formData, exactAge: e.target.value})} className="p-4 md:p-6 bg-slate-50 rounded-xl md:rounded-[2rem] font-black text-sm md:text-lg border-none focus:ring-4 ring-indigo-100 transition-all" />
                                </div>
                                <input required placeholder="Veli Ad Soyad" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full p-4 md:p-6 bg-slate-50 rounded-xl md:rounded-[2rem] font-black text-sm md:text-lg border-none focus:ring-4 ring-indigo-100 transition-all" />
                                <input required placeholder="Telefon (05XX...)" maxLength={11} value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value.replace(/\D/g, '')})} className="w-full p-4 md:p-6 bg-slate-50 rounded-xl md:rounded-[2rem] font-black text-base md:text-2xl border-none focus:ring-4 ring-indigo-100 transition-all" />
                                <label className="flex items-start gap-3 p-4 bg-indigo-50/50 rounded-xl md:rounded-[2.5rem] cursor-pointer group border border-transparent hover:border-indigo-100 transition-all">
                                    <input required type="checkbox" checked={formData.kvkk} onChange={e => setFormData({...formData, kvkk: e.target.checked})} className="mt-1 w-5 h-5 rounded accent-indigo-600 shadow-sm" />
                                    <span className="text-[10px] md:text-xs text-indigo-900 font-black tracking-tight leading-snug">Uzman analiz raporunun tarafıma iletilmesini ve KVKK kapsamında verilerimin işlenmesini kabul ediyorum.</span>
                                </label>
                                <button type="submit" disabled={!formData.name || formData.phone.length < 10 || !formData.kvkk || loading} className="w-full bg-indigo-600 text-white py-5 md:py-7 rounded-[1.5rem] md:rounded-[3rem] font-black text-lg md:text-2xl shadow-2xl flex items-center justify-center gap-4 active-scale disabled:opacity-30 border-b-8 border-indigo-800 transition-all">
                                    {loading ? <Icons.Loader2 size={24} /> : <Fragment><Icons.Send size={24} /> Detaylı Raporumu Gönder</Fragment>}
                                </button>
                            </form>
                        </div>
                    </div>
                );

                if (view === 'success') return (
                    <div className="min-h-screen bg-white flex flex-col items-center justify-center p-6 text-center space-y-10 md:space-y-14 fade-in overflow-x-hidden">
                        <div className="w-32 h-32 md:w-44 md:h-44 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center shadow-inner animate-bounce border-8 border-white ring-[10px] md:ring-[12px] ring-emerald-50 flex-shrink-0"><Icons.CheckCircle2 size={64} /></div>
                        <div className="space-y-4 md:space-y-6 px-4">
                            <h2 className="text-3xl md:text-6xl font-black text-slate-900 italic leading-tight">Tebrikler! İlk Adımı Attınız.</h2>
                            <p className="text-lg md:text-2xl text-slate-500 font-medium max-w-3xl leading-relaxed">Verileriniz güvenle uzmanlarımıza ulaştı. Detaylı analiz raporunuz hazırlanırken uzmanımızla tanışmak için WhatsApp'a yönlendiriliyorsunuz.</p>
                        </div>
                        <div className="flex flex-col gap-4 md:gap-6 w-full max-w-lg px-4">
                            <a href="https://wa.me/905324997374" className="bg-emerald-500 text-white py-6 md:py-8 rounded-[2rem] md:rounded-[3rem] font-black text-xl md:text-3xl flex items-center justify-center gap-4 md:gap-5 shadow-2xl border-b-[8px] md:border-b-[10px] border-emerald-700 animate-pulse active-scale">
                                <Icons.MessageCircle size={32} /> WhatsApp'a Geç
                            </a>
                            <button onClick={() => window.location.reload()} className="flex items-center justify-center gap-2 text-indigo-600 font-black text-sm md:text-lg pt-6 active-scale group">
                                <Icons.Home size={20} /> Anasayfaya gitmek için tıklayınız
                            </button>
                        </div>
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        })();
    </script>
</body>
</html>
