                    const track = DATA[currentTrackKey];
                    const strengths = [];

                        const ans = currentAnswers[q.id];

                        if (isRisk) needs.push(q[`label_${lang}`]); else strengths.push(q[`label_${lang}`]);
                    });
                    return { strengths: strengths.slice(0, 3), needs: needs.slice(0, 3) };
                };

                const handleAnswer = (qId, value, nextQId) => {
                    setAnswers(prev => ({ ...prev, [qId]: value }));
                    if (nextQId) {
                        setTimeout(() => {
                            const el = document.getElementById(`q-${nextQId}`);
                            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }, 100);
                    }
                };

                const handleFinalSubmit = async (e) => {
                    if(e) e.preventDefault();
                    setLoading(true);
                    
                    const track = DATA[trackKey];
                    const testResultsText = track.questions.map(q => {
                        const ans = answers[q.id];
                        const label = typeof ans === 'boolean' ? (ans ? t.yes : t.no) : ans;
                        return `${q[lang]}: ${label}`;
                    }).join('\n');

                    const payload = {
                        language: lang.toUpperCase(),
                        name: formData.name,
                        phone: formData.phone,
                        gender: formData.gender,
                        exactAge: formData.exactAge,
                        trackTitle: track[lang].title,
                        testResults: testResultsText,
                        quickSummary: `${t.strengthsTitle}: ${analysisSummary.strengths.join(', ')} | ${t.needsTitle}: ${analysisSummary.needs.join(', ')}`,
                        submittedAt: new Date().toLocaleString(lang === 'ru' ? 'ru-RU' : (lang === 'tr' ? 'tr-TR' : 'en-US'))
                    };

                    try {
                        await fetch('https://formspree.io/f/mgorekwk', { 
                            method: 'POST', 
                            mode: 'cors',
                            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }, 
                            body: JSON.stringify(payload) 
                        });
                        
                        setView('success');
                        const waMsg = encodeURIComponent(`${lang === 'tr' ? 'Merhaba Serhat Bey,' : (lang === 'ru' ? 'Здравствуйте, Серхат,' : 'Hello Serhat Esen,')} ${lang === 'tr' ? 'Ön değerlendirmeyi tamamladım. Görüşmek istiyorum.' : (lang === 'ru' ? 'Я завершил оценку. Я хотел бы обсудить результат.' : 'I completed the assessment. I would like to discuss it.')}\n\n${lang === 'tr' ? 'Veli' : (lang === 'ru' ? 'Родитель' : 'Parent')}: ${formData.name}`);
                        setTimeout(() => { window.location.href = `https://wa.me/905324997374?text=${waMsg}`; }, 3500);
                    } catch (e) {
                        setView('success');
                    } finally {
                        setLoading(false);
                    }
                };

                if (view === 'landing') return (
                    <div className="min-h-screen bg-white fade-in overflow-x-hidden">
                        {/* Dil Seçici */}
                        <div className="absolute top-4 right-4 z-50 flex gap-2">
                            {['tr', 'en', 'ru'].map(l => (
                                <button key={l} onClick={() => setLang(l)} className={`p-2 rounded-full flex items-center gap-1 text-[10px] font-black uppercase transition-all ${lang === l ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white/20 text-white backdrop-blur-md'}`}><Icons.Globe size={14}/> {l}</button>
                            ))}
                        </div>

                        <section className="bg-indigo-900 text-white px-4 py-16 md:py-36 text-center space-y-8 rounded-b-[3rem] md:rounded-b-[4rem] shadow-2xl relative overflow-hidden">
                            <div className="max-w-4xl mx-auto space-y-6 md:space-y-8 relative z-10 px-2">
                                <div className="flex items-center justify-center gap-2 mb-2">
                                    <Icons.ShieldCheck size={24} />
                                    <span className="text-[10px] md:text-sm font-black uppercase tracking-[0.2em] text-indigo-300">{t.brand}</span>
                                </div>
                                <h1 className="text-3xl md:text-8xl font-black leading-tight tracking-tight break-words">
                                    {t.heroTitle} <br/>
                                    <span className="text-indigo-400">{t.heroTitleSub}</span>
                                </h1>
                                <p className="text-indigo-100 text-base md:text-2xl font-medium max-w-2xl mx-auto opacity-90 italic">
                                    {t.heroDesc}
                                </p>
                                <div className="pt-4 md:pt-8">
                                    <button onClick={() => setView('selection')} className="bg-white text-indigo-900 px-8 py-5 md:px-12 md:py-7 rounded-2xl md:rounded-[2.5rem] font-black text-lg md:text-2xl shadow-2xl hover:bg-indigo-50 transition-all flex items-center gap-3 mx-auto active-scale">
                                        {t.startBtn} <Icons.ChevronRight size={24} />
                                    </button>
                                </div>
                            </div>
                        </section>
                        <section className="px-4 py-16 md:px-6 md:py-24 max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-10">
                            {[
                                { icon: <Icons.Baby size={40}/>, title: t.service3Title, text: t.service3Desc, color: "indigo" },
                                { icon: <Icons.GraduationCap size={40}/>, title: t.service1Title, text: t.service1Desc, color: "amber" },
                                { icon: <Icons.Activity size={40}/>, title: t.service2Title, text: t.service2Desc, color: "rose" }
                            ].map((item, idx) => (
                                <div key={idx} className="p-8 md:p-10 rounded-[2.5rem] md:rounded-[3.5rem] bg-slate-50 border border-slate-100 hover:shadow-xl transition-all group text-center md:text-left">
                                    <div className={`w-16 h-16 bg-${item.color}-100 text-${item.color}-600 rounded-2xl flex items-center justify-center mb-6 shadow-sm mx-auto md:mx-0 group-hover:rotate-12 transition-transform`}>{item.icon}</div>
                                    <h3 className="font-black text-xl md:text-2xl text-slate-800 pt-2 break-words">{item.title}</h3>
                                    <p className="text-slate-500 font-semibold leading-relaxed italic text-sm mt-2">{item.text}</p>
                                </div>
                            ))}
                        </section>
                    </div>
                );

                if (view === 'selection') return (
                    <div className="min-h-screen bg-slate-50 py-12 px-4 md:py-24 md:px-6 fade-in text-center overflow-x-hidden">
                        <div className="max-w-5xl mx-auto space-y-12 md:space-y-16">
                            <div className="space-y-4">
                                <button onClick={() => setView('landing')} className="text-slate-400 font-black text-[10px] uppercase tracking-widest mb-4 hover:text-indigo-600 flex items-center gap-2 mx-auto active-scale">&larr; {t.backBtn}</button>
                                <h2 className="text-3xl md:text-6xl font-black text-slate-900 leading-tight px-4">{t.selectTitle}</h2>
                                <p className="text-slate-500 font-medium text-sm md:text-lg px-2">{t.selectDesc}</p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8 text-left px-2">
                                {Object.entries(DATA).map(([key, item]) => (
                                    <button key={key} onClick={() => { setTrackKey(key); setView('quiz'); window.scrollTo(0,0); }} className="bg-white p-6 md:p-10 rounded-[2rem] md:rounded-[3.5rem] shadow-lg md:shadow-xl hover:shadow-2xl border-4 border-transparent hover:border-indigo-400 transition-all active-scale group grid-button">
                                        <div className={`text-${item.color}-600 p-4 md:p-6 bg-${item.color}-50 rounded-2xl group-hover:scale-110 transition-transform flex-shrink-0 md:mr-6`}>{item.icon}</div>
                                        <div className="space-y-2 flex-1">
                                            <h3 className="text-lg md:text-2xl font-black text-slate-800 leading-tight break-words">{item[lang].title}</h3>
                                            <span className="inline-block text-[10px] md:text-xs font-black text-indigo-600 bg-indigo-50 px-3 py-1 md:px-5 md:py-2 rounded-full uppercase">{item[lang].age}</span>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );

                if (view === 'quiz') {
                    const track = DATA[trackKey];
                    const progress = (Object.keys(answers).length / track.questions.length) * 100;
                    return (
                        <div className="min-h-screen bg-slate-50 p-4 md:p-8 flex flex-col items-center fade-in">
                            <div className="w-full max-w-2xl space-y-6 md:space-y-8">
                                <div className="bg-white p-4 md:p-6 rounded-2xl md:rounded-[2.5rem] shadow-xl flex items-center justify-between sticky top-4 z-50">
                                    <button onClick={() => setView('selection')} className="text-slate-400 text-[10px] font-black uppercase tracking-widest hover:text-red-500 active-scale">&larr; {t.cancelBtn}</button>
                                    <div className="flex-1 mx-4 h-2 bg-slate-100 rounded-full overflow-hidden">
                                        <div className="h-full bg-indigo-600 progress-bar" style={{width: `${progress}%`}}></div>
                                    </div>
                                    <span className="text-indigo-600 font-black text-[10px] md:text-sm">% {Math.round(progress)}</span>
                                </div>
                                <div className="space-y-6 md:space-y-8 pb-32">
                                    {track.questions.map((q, idx) => (
                                        <div key={q.id} id={`q-${q.id}`} className={`bg-white p-6 md:p-12 rounded-[2rem] md:rounded-[4rem] shadow-lg md:shadow-2xl border-2 transition-all duration-500 ${answers[q.id] !== undefined ? 'opacity-30 border-transparent scale-95' : 'border-indigo-100'}`}>
                                            <p className="font-black text-slate-800 text-xl md:text-3xl leading-tight mb-8 md:mb-10 break-words">{idx + 1}. {q[lang]}</p>
                                            {q.type === 'choice' ? (
                                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                                                    {(lang === 'tr' ? q.options_tr : (lang === 'ru' ? q.options_ru : q.options_en)).map((opt, oIdx) => (
                                                        <button key={oIdx} onClick={() => handleAnswer(q.id, opt, track.questions[idx+1]?.id)} className={`py-4 md:py-6 rounded-2xl font-black text-sm md:text-base transition-all active-scale ${answers[q.id] === opt ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-50 text-slate-400 border border-transparent'}`}>{opt}</button>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="flex gap-4 md:gap-5">
                                                    <button onClick={() => handleAnswer(q.id, true, track.questions[idx+1]?.id)} className={`flex-1 py-5 md:py-7 rounded-[1.5rem] md:rounded-[2.5rem] font-black text-lg md:text-2xl transition-all active-scale ${answers[q.id] === true ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-50 text-slate-400'}`}>{t.yes}</button>
                                                    <button onClick={() => handleAnswer(q.id, false, track.questions[idx+1]?.id)} className={`flex-1 py-5 md:py-7 rounded-[1.5rem] md:rounded-[2.5rem] font-black text-lg md:text-2xl transition-all active-scale ${answers[q.id] === false ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-50 text-slate-400'}`}>{t.no}</button>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                <div className="fixed bottom-6 md:bottom-10 left-4 right-4 max-w-2xl mx-auto">
                                    <button disabled={Object.keys(answers).length < track.questions.length} onClick={() => { setAnalysisSummary(generateQuickAnalysis(answers, trackKey)); setView('details'); window.scrollTo(0,0); }} className="w-full bg-slate-900 text-white py-6 md:py-8 rounded-2xl md:rounded-[3rem] font-black text-lg md:text-2xl shadow-2xl disabled:opacity-20 flex items-center justify-center gap-4 active-scale">
                                        {t.finishBtn} <Icons.ChevronRight size={28} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    );
                }

                if (view === 'details') return (
                    <div className="min-h-screen bg-indigo-900 flex flex-col items-center justify-center p-4 md:p-6 py-10 md:py-20 fade-in">
                        <div className="w-full max-w-2xl bg-white p-6 md:p-16 rounded-[2.5rem] md:rounded-[5rem] shadow-2xl space-y-8 md:space-y-10">
                            <div className="space-y-6 md:space-y-8 text-center px-2">
                                <h2 className="text-2xl md:text-4xl font-black text-slate-900">{t.resultTitle}</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 text-left">
                                    <div className="bg-emerald-50 border-2 border-emerald-100 p-6 md:p-8 rounded-[1.5rem] md:rounded-[3.5rem] space-y-4 shadow-sm">
                                        <div className="flex items-center gap-2 text-emerald-600"><Icons.ThumbsUp size={20} /><span className="text-[10px] md:text-xs font-black uppercase">{t.strengthsTitle}</span></div>
                                        <ul className="space-y-2">{analysisSummary.strengths.map(s => <li key={s} className="text-slate-700 text-xs md:text-sm font-bold flex items-center gap-2 md:gap-3"><div className="w-2 h-2 bg-emerald-400 rounded-full flex-shrink-0"></div> <span className="break-words">{s}</span></li>)}</ul>
                                    </div>
                                    <div className="bg-rose-50 border-2 border-rose-100 p-6 md:p-8 rounded-[1.5rem] md:rounded-[3.5rem] space-y-4 shadow-sm">
                                        <div className="flex items-center gap-2 text-rose-600"><Icons.AlertTriangle size={20} /><span className="text-[10px] md:text-xs font-black uppercase">{t.needsTitle}</span></div>
                                        <ul className="space-y-2">{analysisSummary.needs.map(n => <li key={n} className="text-slate-700 text-xs md:text-sm font-bold flex items-center gap-2 md:gap-3"><div className="w-2 h-2 bg-rose-400 rounded-full flex-shrink-0"></div> <span className="break-words">{n}</span></li>)}</ul>
                                    </div>
                                </div>
                                <p className="text-[10px] md:text-xs text-slate-500 font-bold italic border-t pt-4">{t.detailsNote}</p>
                            </div>
                            <form onSubmit={handleFinalSubmit} className="space-y-4 md:space-y-5">
                                <div className="grid grid-cols-2 gap-3 md:gap-5">
                                    <select required value={formData.gender} onChange={e => setFormData({...formData, gender: e.target.value})} className="p-4 md:p-6 bg-slate-50 rounded-xl md:rounded-[2rem] font-black text-sm md:text-lg border-none focus:ring-4 ring-indigo-100 transition-all"><option value="">{t.gender}</option><option value={t.male}>{t.male}</option><option value={t.female}>{t.female}</option></select>
                                    <input required placeholder={t.exactAge} value={formData.exactAge} onChange={e => setFormData({...formData, exactAge: e.target.value})} className="p-4 md:p-6 bg-slate-50 rounded-xl md:rounded-[2rem] font-black text-sm md:text-lg border-none focus:ring-4 ring-indigo-100 transition-all" />
                                </div>
                                <input required placeholder={t.fullName} value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full p-4 md:p-6 bg-slate-50 rounded-xl md:rounded-[2rem] font-black text-sm md:text-lg border-none focus:ring-4 ring-indigo-100 transition-all" />
                                <input required placeholder={t.phone} maxLength={11} value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value.replace(/\D/g, '')})} className="w-full p-4 md:p-6 bg-slate-50 rounded-xl md:rounded-[2rem] font-black text-base md:text-2xl border-none focus:ring-4 ring-indigo-100 transition-all" />
                                <label className="flex items-start gap-3 p-4 bg-indigo-50/50 rounded-xl md:rounded-[2.5rem] cursor-pointer group border border-transparent hover:border-indigo-100 transition-all">
                                    <input required type="checkbox" checked={formData.kvkk} onChange={e => setFormData({...formData, kvkk: e.target.checked})} className="mt-1 w-5 h-5 rounded accent-indigo-600 shadow-sm" />
                                    <span className="text-[10px] md:text-xs text-indigo-900 font-black tracking-tight leading-snug">{t.kvkkLabel}</span>
                                </label>
                                <button type="submit" disabled={!formData.name || formData.phone.length < 10 || !formData.kvkk || loading} className="w-full bg-indigo-600 text-white py-5 md:py-7 rounded-[1.5rem] md:rounded-[3rem] font-black text-lg md:text-2xl shadow-2xl flex items-center justify-center gap-4 active-scale disabled:opacity-30 border-b-8 border-indigo-800 transition-all">
                                    {loading ? <Icons.Loader2 size={24} /> : <Fragment><Icons.Send size={24} /> {t.submitBtn}</Fragment>}
                                </button>
                            </form>
                        </div>
                    </div>
                );

                if (view === 'success') return (
                    <div className="min-h-screen bg-white flex flex-col items-center justify-center p-6 text-center space-y-10 md:space-y-14 fade-in overflow-x-hidden px-4">
                        <div className="w-32 h-32 md:w-44 md:h-44 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center shadow-inner animate-bounce border-8 border-white ring-[10px] md:ring-[12px] ring-emerald-50 flex-shrink-0"><Icons.CheckCircle2 size={64} /></div>
                        <div className="space-y-4 md:space-y-6">
                            <h2 className="text-3xl md:text-6xl font-black text-slate-900 italic leading-tight">{t.congrats}</h2>
                            <p className="text-lg md:text-2xl text-slate-500 font-medium max-w-3xl leading-relaxed mx-auto">{t.successMsg}</p>
                        </div>
                        <div className="flex flex-col gap-4 md:gap-6 w-full max-w-lg">
                            <a href="https://wa.me/905324997374" className="bg-emerald-500 text-white py-6 md:py-8 rounded-[2rem] md:rounded-[3rem] font-black text-xl md:text-3xl flex items-center justify-center gap-4 md:gap-5 shadow-2xl border-b-[8px] md:border-b-[10px] border-emerald-700 animate-pulse active-scale">
                                <Icons.MessageCircle size={32} /> {t.waBtn}
                            </a>
                            <button onClick={() => window.location.reload()} className="flex items-center justify-center gap-2 text-indigo-600 font-black text-sm md:text-lg pt-6 active-scale group">
                                <Icons.Home size={20} /> {t.homeBtn}
                            </button>
                        </div>
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        })();
    </script>
</body>
</html>
