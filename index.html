<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Özel Dokunuş - Gelişim Analiz Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #F8FAFC;
            margin: 0; padding: 0;
            scroll-behavior: smooth;
        }
        .progress-bar { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-active:active { transform: scale(0.96); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        input, textarea, select { font-size: 16px !important; transition: all 0.2s ease; }
        .card { background: white; border-radius: 2rem; border: 1px solid #F1F5F9; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); transition: all 0.3s ease; }
        .question-card { scroll-margin-top: 120px; }
        .required-label::after { content: " *"; color: #ef4444; }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        // WEBHOOK VE FORMSPREE AYARLARI
        const makeWebhookUrl = "https://hook.eu1.make.com/ez9g17ta1hhqho48vstimvqvx3l1pibz";
        const formspreeUrl = "https://formspree.io/f/mpqoblva"; // Sizin Formspree ID'niz

        const DATA = {
            infant: [
                { id: "inf_1", text: "Göz teması kuruyor, sizinle duygusal etkileşime giriyor ve yüzünüze odaklanıyor mu?" },
                { id: "inf_2", text: "Seslere tepki veriyor, ismiyle seslenildiğinde dönüp bakıyor mu?" },
                { id: "inf_3", text: "İlgisini çeken bir nesneyi parmağıyla gösterip sizin de bakmanızı bekliyor mu?" },
                { id: "inf_4", text: "Sosyal gülümseme veya taklit etme eğilimi var mı?" },
                { id: "inf_5", text: "Yaşına uygun heceleme veya basit kelime denemeleri yapıyor mu?" }
            ],
            preschool: [
                { id: "pre_1", text: "İsmiyle seslenildiğinde dönüp bakıyor veya karşılık veriyor mu?" },
                { id: "pre_2", text: "İlgisini çeken bir nesneyi parmağıyla göstererek sizinle paylaşıyor mu?" },
                { id: "pre_3", text: "Diğer çocukların oyunlarına dahil olmaya çalışıyor mu?" },
                { id: "pre_4", text: "Düzenli, anlamlı ve derinlemesine göz teması kuruyor mu?" },
                { id: "pre_5", text: "Hayali oyunlar oynuyor mu?" }
            ],
            primary: [
                { id: "pri_1", text: "Okurken satır atlıyor, kelime sonlarını uyduruyor veya harfleri (b-d, m-n) karıştırıyor mu?" },
                { id: "pri_2", text: "Okuma hızı sınıf ortalamasının altında mı?" },
                { id: "pri_3", text: "Matematiksel sembolleri karıştırıyor veya parmak sayıyor mu?" },
                { id: "pri_4", text: "Yazı yazarken harf eksik bırakıyor mu?" },
                { id: "pri_5", text: "Sağ-sol ayrımı yapmakta veya zaman kavramlarını karıştırıyor mu?" }
            ]
        };

        let state = {
            view: 'landing',
            ageGroup: null,
            answers: {},
            formData: {
                name: '', phone: '', kvkk: false,
                gender: '', exactAge: '', diagnosis: '', meds: '',
                specificDiagnosis: '', otherDiagnosisDetail: '',
                routine: '', sensitivity: '', biggestProblem: '', primaryGoal: '',
                likes: [], otherLikeDetail: '', birthInfo: ''
            }
        };

        function render() {
            const app = document.getElementById('app');
            if (state.view === 'landing') renderLanding(app);
            else if (state.view === 'quiz') renderQuiz(app);
            else if (state.view === 'details') renderDetails(app);
            else if (state.view === 'success') renderSuccess(app);
        }

        function renderLanding(app) {
            app.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-6 fade-in text-center">
                    <div class="max-w-4xl w-full space-y-12">
                        <div class="space-y-4">
                            <span class="text-indigo-600 font-extrabold text-sm tracking-widest uppercase tracking-tight">Özel Dokunuş Eğitim Danışmanlık</span>
                            <h1 class="text-4xl md:text-6xl font-black text-slate-900 leading-tight">Gelişim Analiz <br/><span class="text-indigo-600">Sistemi</span></h1>
                            <p class="text-slate-500 text-lg font-medium">Uzman destekli ön değerlendirme için yaş grubunu seçin.</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <button onclick="changeView('quiz', 'infant')" class="card p-8 hover:border-indigo-400 btn-active text-left"><h3 class="text-xl font-black text-slate-800">0-2 Yaş</h3></button>
                            <button onclick="changeView('quiz', 'preschool')" class="card p-8 hover:border-indigo-400 btn-active text-left"><h3 class="text-xl font-black text-slate-800">3-6 Yaş</h3></button>
                            <button onclick="changeView('quiz', 'primary')" class="card p-8 hover:border-indigo-400 btn-active text-left"><h3 class="text-xl font-black text-slate-800">7-12 Yaş</h3></button>
                        </div>
                    </div>
                </div>`;
        }

        function renderQuiz(app) {
            const qs = DATA[state.ageGroup];
            const answeredCount = Object.keys(state.answers).length;
            const progress = (answeredCount / qs.length) * 100;
            
            app.innerHTML = `
                <div class="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    <div class="max-w-2xl w-full sticky top-4 z-20 mb-8 card p-4 backdrop-blur-md bg-white/90">
                        <div class="flex items-center justify-between mb-2">
                            <button onclick="changeView('landing')" class="text-[10px] font-black uppercase text-slate-400 hover:text-indigo-600">Geri Dön</button>
                            <span class="text-xs font-bold text-indigo-600">Soru ${answeredCount} / ${qs.length}</span>
                        </div>
                        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                            <div class="progress-bar bg-indigo-600 h-full" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    <div class="max-w-2xl w-full space-y-6 pb-40">
                        ${qs.map((q, idx) => `
                            <div id="q-${q.id}" class="card question-card p-8 ${state.answers[q.id] !== undefined ? 'bg-indigo-50/10' : ''}">
                                <p class="text-lg font-bold text-slate-800 mb-6 leading-snug">${idx + 1}. ${q.text}</p>
                                <div class="grid grid-cols-2 gap-4">
                                    <button onclick="handleAnswer('${q.id}', true, ${idx})" class="py-4 rounded-2xl font-black border-2 transition-all btn-active ${state.answers[q.id] === true ? 'bg-indigo-600 border-indigo-600 text-white shadow-lg' : 'bg-slate-50 border-transparent text-slate-500'}">EVET</button>
                                    <button onclick="handleAnswer('${q.id}', false, ${idx})" class="py-4 rounded-2xl font-black border-2 transition-all btn-active ${state.answers[q.id] === false ? 'bg-indigo-600 border-indigo-600 text-white shadow-lg' : 'bg-slate-50 border-transparent text-slate-500'}">HAYIR</button>
                                </div>
                            </div>`).join('')}
                    </div>
                    <div class="fixed bottom-8 left-4 right-4 max-w-2xl mx-auto">
                        <button id="nextBtn" ${answeredCount < qs.length ? 'disabled' : ''} onclick="changeView('details')" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-bold shadow-2xl disabled:opacity-20 btn-active transition-all">Bilgilere Geç</button>
                    </div>
                </div>`;
        }

        function renderDetails(app) {
            let agePlaceholder = state.ageGroup === 'infant' ? "Örn: 18 Aylık" : "Örn: 9 Yaş";

            app.innerHTML = `
                <div class="min-h-screen p-4 md:p-8 flex flex-col items-center pb-20">
                    <div class="max-w-2xl w-full space-y-8">
                        <button onclick="changeView('quiz')" class="px-5 py-2.5 bg-white border border-slate-200 rounded-full text-xs font-bold text-slate-500 btn-active shadow-sm flex items-center gap-2"><span>&larr;</span> Sorulara Dön</button>
                        
                        <div class="card p-8 space-y-6">
                            <h2 class="text-2xl font-black text-center text-indigo-900 border-b pb-4">Genel Profil & Öykü</h2>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="text-[10px] font-black text-slate-400 uppercase required-label">Cinsiyet</label>
                                <select onchange="updateForm('gender', this.value)" class="w-full p-3 bg-slate-50 rounded-xl outline-none mt-1 border">
                                    <option value="">Seçiniz</option><option value="Erkek" ${state.formData.gender === 'Erkek' ? 'selected' : ''}>Erkek</option><option value="Kız" ${state.formData.gender === 'Kız' ? 'selected' : ''}>Kız</option>
                                </select></div>
                                <div><label class="text-[10px] font-black text-slate-400 uppercase required-label">Tam Yaşı</label>
                                <input type="text" placeholder="${agePlaceholder}" value="${state.formData.exactAge}" oninput="updateForm('exactAge', this.value)" class="w-full p-3 bg-slate-50 rounded-xl outline-none mt-1 border"></div>
                            </div>

                            <label class="block">
                                <span class="text-[10px] font-black text-slate-400 uppercase required-label">Gelişimsel tanı veya uzman takibi var mı?</span>
                                <select onchange="updateForm('diagnosis', this.value)" class="w-full p-3 bg-slate-50 rounded-xl outline-none mt-1 border">
                                    <option value="">Seçiniz</option><option value="Hayır" ${state.formData.diagnosis === 'Hayır' ? 'selected' : ''}>Hayır</option><option value="Evet" ${state.formData.diagnosis === 'Evet' ? 'selected' : ''}>Evet</option>
                                </select>
                            </label>

                            ${state.formData.diagnosis === 'Evet' ? `
                            <div class="animate-in fade-in slide-in-from-top-2 duration-300 space-y-4 bg-indigo-50/30 p-4 rounded-2xl border border-indigo-100">
                                <div><label class="text-[10px] font-black text-indigo-600 uppercase required-label">Tanı Detayı</label>
                                <select onchange="updateForm('specificDiagnosis', this.value)" class="w-full p-3 bg-white rounded-xl outline-none mt-1 border font-bold text-indigo-600">
                                    <option value="">Seçiniz</option>
                                    <option value="Atipik Otizm" ${state.formData.specificDiagnosis === 'Atipik Otizm' ? 'selected' : ''}>Atipik Otizm</option>
                                    <option value="DEHB" ${state.formData.specificDiagnosis === 'DEHB' ? 'selected' : ''}>DEHB</option>
                                    <option value="Özel Öğrenme Güçlüğü" ${state.formData.specificDiagnosis === 'Özel Öğrenme Güçlüğü' ? 'selected' : ''}>Özel Öğrenme Güçlüğü</option>
                                    <option value="Diğer" ${state.formData.specificDiagnosis === 'Diğer' ? 'selected' : ''}>Diğer</option>
                                </select></div>
                                ${state.formData.specificDiagnosis === 'Diğer' ? `
                                <input type="text" placeholder="Lütfen tanıyı belirtiniz" value="${state.formData.otherDiagnosisDetail}" oninput="updateForm('otherDiagnosisDetail', this.value)" class="w-full p-3 bg-white rounded-xl outline-none border font-medium">` : ''}
                            </div>` : ''}

                            <textarea oninput="updateForm('routine', this.value)" placeholder="Günlük rutinler, duyusal hassasiyetler, öfke durumları..." class="w-full p-4 bg-slate-50 rounded-xl outline-none h-24 text-sm font-medium border">${state.formData.routine}</textarea>

                            <div class="pt-6 border-t space-y-4">
                                <div><label class="text-[10px] font-black text-slate-400 uppercase required-label ml-1">Veli Ad Soyad</label>
                                <input type="text" placeholder="Ad Soyad" value="${state.formData.name}" oninput="updateForm('name', this.value)" class="w-full p-4 bg-slate-50 rounded-xl outline-none font-bold border focus:border-indigo-500"></div>
                                <div><label class="text-[10px] font-black text-slate-400 uppercase required-label ml-1">Veli Telefon Numarası</label>
                                <input type="tel" maxlength="11" placeholder="05xx xxx xx xx" value="${state.formData.phone}" oninput="updateForm('phone', this.value)" class="w-full p-4 bg-slate-50 rounded-xl outline-none font-bold border focus:border-indigo-500"></div>
                                <label class="flex items-start gap-3 p-2 cursor-pointer transition-all">
                                    <input type="checkbox" ${state.formData.kvkk ? 'checked' : ''} onchange="updateForm('kvkk', this.checked); validateForm();" class="mt-1 w-5 h-5 accent-indigo-600">
                                    <span class="text-[11px] text-slate-500 font-medium italic">KVKK metnini okudum, verilerimin uzman değerlendirmesi amacıyla işlenmesini kabul ediyorum.</span>
                                </label>
                            </div>

                            <button id="finalSubmitBtn" disabled onclick="submitData()" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black text-lg shadow-xl btn-active disabled:opacity-30 transition-all">Analizi Tamamla ve Gönder</button>
                        </div>
                    </div>
                </div>`;
            validateForm();
        }

        function renderSuccess(app) {
            app.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-6 text-center fade-in">
                    <div class="max-w-md w-full card p-12 space-y-8 shadow-2xl">
                        <div class="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto animate-bounce shadow-inner">
                            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                        </div>
                        <h2 class="text-3xl font-black text-slate-900 leading-tight">Başvurunuz Alındı!</h2>
                        <p class="text-slate-600 text-sm font-medium italic">Veli bilgileriniz ve test yanıtlarınız sisteme kaydedildi. Raporunuz hazırlanıyor.</p>
                    </div>
                </div>`;
            setTimeout(() => window.open('https://ozeldokunus.com', '_top'), 5000);
        }

        function changeView(view, group = null) { state.view = view; if (group) state.ageGroup = group; render(); window.scrollTo(0, 0); }
        
        function handleAnswer(id, val, idx) { 
            state.answers[id] = val; render(); 
            const questions = DATA[state.ageGroup];
            if (idx < questions.length - 1) {
                setTimeout(() => {
                    const el = document.getElementById(`q-${questions[idx + 1].id}`);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 50);
            }
        }

        function updateForm(key, val) { state.formData[key] = (key === 'phone') ? val.replace(/\D/g, '') : val; if (key === 'diagnosis' || key === 'specificDiagnosis') render(); validateForm(); }

        function validateForm() {
            const btn = document.getElementById('finalSubmitBtn');
            if (!btn) return;
            const valid = state.formData.name.trim().length >= 3 && /^05\d{9}$/.test(state.formData.phone) && state.formData.kvkk;
            btn.disabled = !valid;
        }

        async function submitData() {
            const btn = document.getElementById('finalSubmitBtn');
            btn.innerText = "Gönderiliyor..."; btn.disabled = true;

            const results = Object.entries(state.answers).map(([id, val]) => {
                const q = Object.values(DATA).flat().find(q => q.id === id);
                return `${q ? q.text : id}: ${val ? 'EVET' : 'HAYIR'}`;
            }).join('\n');

            const payload = { 
                ...state.formData, 
                ageGroup: state.ageGroup, 
                testResults: results, 
                submittedAt: new Date().toLocaleString('tr-TR', { timeZone: 'Europe/Istanbul' }) 
            };
            
            // KESİN GÖNDERİM MANTIĞI: Her iki servisi aynı anda tetikle
            Promise.allSettled([
                fetch(formspreeUrl, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }, 
                    body: JSON.stringify(payload) 
                }),
                fetch(makeWebhookUrl, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                })
            ]).finally(() => {
                changeView('success');
            });
        }

        render();
    </script>
</body>
</html>
